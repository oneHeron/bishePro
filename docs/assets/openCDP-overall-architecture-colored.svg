<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg{fill:#fbfaf6;}
      .dash{fill:none;stroke:#28343b;stroke-width:2.2;stroke-dasharray:14 10;}
      .title{font:700 28px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#24333b;}
      .section{font:700 26px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#d63d22;}
      .label{font:700 20px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#1a1f24;}
      .small{font:500 16px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#364148;}
      .cloud{fill:#fff1c8;opacity:0.92;}
      .card{fill:#ffffff;stroke:#444f56;stroke-width:2;}
      .disk{fill:#f6f6f6;stroke:#4b5560;stroke-width:2;}
      .circle{fill:#ffffff;stroke:#8c9398;stroke-width:1.6;stroke-dasharray:4 3;}
      .flow{stroke:#e17f2f;stroke-width:5;fill:none;stroke-dasharray:10 8;marker-end:url(#arrow);}
      .flow2{stroke:#4b7da0;stroke-width:4;fill:none;marker-end:url(#arrowBlue);}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e17f2f"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b7da0"/>
