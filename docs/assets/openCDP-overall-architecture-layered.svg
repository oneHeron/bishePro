<svg width="1500" height="1040" viewBox="0 0 1500 1040" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg{fill:#fcfaf6;}
      .frame{fill:none;stroke:#3d4a52;stroke-width:2.2;stroke-dasharray:10 8;}
      .side{fill:#ffffff;stroke:#2f3d45;stroke-width:2;}
      .inner{fill:#ffffff;stroke:#8a6a3d;stroke-width:1.8;}
      .inner2{fill:#ffffff;stroke:#4d7590;stroke-width:1.8;}
      .title{font:700 26px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#24333b;}
      .layer{font:700 28px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#2d6276;}
      .text{font:600 16px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#1b1f23;}
      .small{font:500 14px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#49565d;}
      .tiny{font:500 13px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#49565d;}
      .api{font:700 22px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#1f4872;}
      .arrow{stroke:#3f76a0;stroke-width:3;fill:none;marker-end:url(#arrow);}
      .arrow2{stroke:#9a743d;stroke-width:2.5;fill:none;marker-end:url(#arrow2);}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f76a0"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a743d"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1500" height="1040"/>
  <text class="title" x="750" y="44" text-anchor="middle">OpenCDP 系统总体分层架构图</text>

  <rect class="side" x="30" y="85" width="210" height="100"/>
  <text class="title" x="135" y="145" text-anchor="middle">前端展示层</text>
  <path class="arrow2" d="M240 135 L320 135"/>

  <rect class="frame" x="330" y="55" width="1130" height="165"/>
  <text class="layer" x="895" y="92" text-anchor="middle">Web 用户界面</text>
  <rect class="inner" x="405" y="118" width="280" height="54"/>
  <rect class="inner" x="730" y="118" width="340" height="54"/>
  <rect class="inner" x="1115" y="118" width="270" height="54"/>
  <text class="text" x="555" y="152" text-anchor="middle">用户登录注册界面</text>
  <text class="text" x="905" y="152" text-anchor="middle">方法 / 数据集 / 指标浏览与运行配置界面</text>
  <text class="text" x="1250" y="152" text-anchor="middle">结果详情与运行历史界面</text>

  <text class="api" x="820" y="265" text-anchor="middle">RESTful API</text>
  <path class="arrow" d="M895 220 L895 300"/>

  <rect class="side" x="30" y="395" width="210" height="100"/>
  <text class="title" x="135" y="455" text-anchor="middle">后端接口层</text>
  <path class="arrow2" d="M240 445 L320 445"/>

  <rect class="frame" x="330" y="300" width="1130" height="340"/>
  <text class="layer" x="895" y="350" text-anchor="middle">FastAPI 服务与核心业务层</text>

  <rect class="inner" x="785" y="365" width="220" height="50"/>
  <text class="text" x="895" y="397" text-anchor="middle">接口网关 / 路由入口</text>

  <rect class="inner2" x="455" y="450" width="270" height="78"/>
  <rect class="inner2" x="765" y="450" width="270" height="78"/>
  <rect class="inner2" x="1075" y="450" width="290" height="78"/>
  <text class="text" x="600" y="482" text-anchor="middle">公开资源服务</text>
  <text class="small" x="600" y="505" text-anchor="middle">methods / datasets / metrics / preview</text>
  <text class="text" x="900" y="482" text-anchor="middle">认证服务</text>
  <text class="small" x="900" y="505" text-anchor="middle">register / login</text>
  <text class="text" x="1200" y="482" text-anchor="middle">运行任务服务</text>
  <text class="tiny" x="1200" y="503" text-anchor="middle">
    <tspan x="1200" dy="0">submit / query / results</tspan>
    <tspan x="1200" dy="16">cancel / history</tspan>
  </text>

  <rect class="inner" x="715" y="560" width="360" height="50"/>
  <text class="text" x="895" y="592" text-anchor="middle">业务逻辑：校验、鉴权、记录创建</text>

  <path class="arrow2" d="M895 415 L895 450"/>
  <path class="arrow2" d="M600 528 L815 560"/>
  <path class="arrow2" d="M900 528 L900 560"/>
  <path class="arrow2" d="M1200 528 L975 560"/>

  <path class="arrow" d="M895 615 L895 695"/>

  <rect class="side" x="30" y="660" width="210" height="100"/>
  <text class="title" x="135" y="720" text-anchor="middle">中间运行层</text>
  <path class="arrow2" d="M240 710 L320 710"/>

  <rect class="frame" x="330" y="665" width="1130" height="225"/>
  <text class="layer" x="895" y="725" text-anchor="middle">异步调度与插件执行层</text>

  <rect class="inner2" x="390" y="760" width="240" height="78"/>
  <rect class="inner2" x="670" y="760" width="240" height="78"/>
  <rect class="inner2" x="950" y="760" width="240" height="78"/>
  <rect class="inner2" x="1230" y="760" width="190" height="78"/>
  <text class="text" x="510" y="793" text-anchor="middle">插件注册中心</text>
  <text class="small" x="510" y="816" text-anchor="middle">methods / datasets / metrics</text>
  <text class="text" x="790" y="793" text-anchor="middle">异步任务调度器</text>
  <text class="tiny" x="790" y="814" text-anchor="middle">
    <tspan x="790" dy="0">submit_run /</tspan>
    <tspan x="790" dy="16">cancel_run_execution</tspan>
  </text>
  <text class="text" x="1070" y="793" text-anchor="middle">队列执行</text>
  <text class="tiny" x="1070" y="814" text-anchor="middle">
    <tspan x="1070" dy="0">Redis + RQ / CPU / GPU</tspan>
    <tspan x="1070" dy="16">/ Remote</tspan>
  </text>
  <text class="text" x="1325" y="793" text-anchor="middle">本地回退执行</text>
  <text class="small" x="1325" y="816" text-anchor="middle">thread fallback</text>

  <path class="arrow2" d="M630 799 L670 799"/>
  <path class="arrow2" d="M910 799 L950 799"/>
  <path class="arrow2" d="M1190 799 L1230 799"/>

  <path class="arrow" d="M895 875 L895 940"/>

  <rect class="side" x="30" y="920" width="210" height="100"/>
  <text class="title" x="135" y="980" text-anchor="middle">数据持久化层</text>
  <path class="arrow2" d="M240 970 L320 970"/>

  <rect class="frame" x="330" y="910" width="1130" height="125"/>
  <rect class="inner2" x="380" y="950" width="280" height="52"/>
  <rect class="inner2" x="705" y="950" width="350" height="52"/>
  <rect class="inner2" x="1100" y="950" width="320" height="52"/>
  <text class="text" x="520" y="982" text-anchor="middle">SQLite + SQLAlchemy</text>
  <text class="text" x="880" y="982" text-anchor="middle">运行记录表 users / runs</text>
  <text class="text" x="1260" y="982" text-anchor="middle">数据集目录与结果存储</text>
</svg>
