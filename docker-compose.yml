version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: cdp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cdp-backend
    working_dir: /app/backend
    environment:
      RUNNER_BACKEND: rq
      REDIS_URL: redis://redis:6379/0
      RUN_QUEUE: runs
      DATABASE_URL: sqlite:////app/backend/app.db
      DATASETS_ROOT: /app/datasets
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cdp-worker
    working_dir: /app/backend
    environment:
      RUNNER_BACKEND: rq
      REDIS_URL: redis://redis:6379/0
      RUN_QUEUE: runs
      DATABASE_URL: sqlite:////app/backend/app.db
      DATASETS_ROOT: /app/datasets
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: python -m rq worker runs
